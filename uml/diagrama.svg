<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" font-family="Consolas, monospace" font-size="13">
  <rect width="700" height="500" fill="#ffffff"/>

  <!-- Conexion -->
  <g>
    <rect x="40" y="40" width="270" height="110" fill="#eef4ff" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="40" y1="70" x2="310" y2="70" stroke="#2c3e50"/>
    <line x1="40" y1="90" x2="310" y2="90" stroke="#2c3e50"/>
    <text x="175" y="58" text-anchor="middle" font-weight="bold">Conexion</text>
    <text x="50" y="84">- instancia : ?PDO {static}</text>
    <text x="50" y="108">- __construct()</text>
    <text x="50" y="128">+ obtener() : PDO {static}</text>
  </g>

  <!-- PDO externo -->
  <g>
    <rect x="390" y="40" width="150" height="70" fill="#f5f5f5" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="465" y="62" text-anchor="middle" font-style="italic" font-size="11">&#171;PHP nativa&#187;</text>
    <text x="465" y="84" text-anchor="middle" font-weight="bold">PDO</text>
  </g>

  <!-- Pelicula -->
  <g>
    <rect x="40" y="220" width="580" height="210" fill="#eefbf0" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="40" y1="250" x2="620" y2="250" stroke="#2c3e50"/>
    <line x1="40" y1="270" x2="620" y2="270" stroke="#2c3e50"/>
    <text x="330" y="238" text-anchor="middle" font-weight="bold">Pelicula</text>
    <text x="50" y="264">- pdo : PDO</text>
    <text x="50" y="288">+ __construct(pdo: PDO)</text>
    <text x="50" y="308">+ todos() : array</text>
    <text x="50" y="328">+ porId(id: int) : ?array</text>
    <text x="50" y="348">+ crear(titulo, director, anio, genero, duracion) : int</text>
    <text x="50" y="368">+ actualizar(id, titulo, director, anio, genero, duracion) : bool</text>
    <text x="50" y="388">+ eliminar(id: int) : bool</text>
  </g>

  <!-- Dependencias hacia PDO, linea discontinua con flecha abierta -->
  <line x1="300" y1="220" x2="440" y2="110" stroke="#7f8c8d" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="310" y1="90" x2="390" y2="75" stroke="#2c3e50" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="318" y="78" font-size="10" font-style="italic">crea / devuelve</text>
  <text x="315" y="165" font-size="10" font-style="italic">usa</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7f8c8d" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Nota -->
  <g>
    <rect x="40" y="446" width="580" height="34" fill="#fffbe6" stroke="#c9b458" stroke-width="1"/>
    <text x="50" y="462" font-size="11">Singleton: obtener() siempre devuelve la misma instancia PDO.</text>
    <text x="50" y="476" font-size="11">index.php la usa para inyectar ese PDO en el constructor de Pelicula.</text>
  </g>
</svg>
